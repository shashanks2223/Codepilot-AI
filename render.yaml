databases:
  # 1. PostgreSQL Database
  - name: codepilot-postgres
    databaseName: codepilot
    user: codepilot_user
    plan: free

services:
  # 2. FastAPI Web Service
  - type: web
    name: codepilot-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codepilot-postgres
          property: connectionString
      - key: BACKEND_URL
        value: https://codepilot-backend.onrender.com
      - key: FRONTEND_URL
        value: https://codepilot-ai-sigma-woad.vercel.app
      - key: GEMINI_API_KEY
        sync: false # Must be set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true # Render will generate a secure random value
      - key: GITHUB_CLIENT_ID
        sync: false # Set manually in Render dashboard for OAuth
      - key: GITHUB_CLIENT_SECRET
        sync: false # Set manually in Render dashboard for OAuth
      - key: BACKEND_CORS_ORIGINS
        value: http://localhost:3000,http://localhost,http://127.0.0.1:3000,http://127.0.0.1,https://codepilot-ai-sigma-woad.vercel.app
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
