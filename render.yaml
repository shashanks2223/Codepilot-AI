databases:
  # 1. PostgreSQL Database
  - name: codepilot-postgres
    databaseName: codepilot
    user: codepilot_user
    plan: free

services:
  # 2. Redis (Used as Celery Message Broker)
  - type: redis
    name: codepilot-redis
    plan: free
    ipAllowList: [] # Private/Internal only

  # 3. FastAPI Web Service
  - type: web
    name: codepilot-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codepilot-postgres
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: codepilot-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false # Must be set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true # Render will generate a secure random value
      - key: GITHUB_CLIENT_ID
        sync: false # Set manually in Render dashboard for OAuth
      - key: GITHUB_CLIENT_SECRET
        sync: false # Set manually in Render dashboard for OAuth
      - key: BACKEND_CORS_ORIGINS
        sync: false # Set manually to allow vercel requests
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000

  # 4. Celery Worker (Background Job Processing)
  - type: worker
    name: codepilot-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    dockerCommand: celery -A app.workers.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codepilot-postgres
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: codepilot-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
